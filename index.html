<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Hunter Pro V3 - 作战大盘</title>
    <!-- 引入 Tailwind CSS 进行快速美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a; /* 深蓝色暗黑背景 */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 呼吸灯动画 */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .status-active {
            animation: pulse-green 2s infinite;
        }
        /* 隐藏日志框的默认滚动条以保持美观，但保留滚动功能 */
        #logTerminal::-webkit-scrollbar {
            width: 6px;
        }
        #logTerminal::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        #logTerminal::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.5);
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col">

    <!-- 顶部导航栏 -->
    <header class="flex justify-between items-center mb-6 glass-panel p-4 rounded-xl flex-shrink-0">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-crosshairs text-3xl text-emerald-400"></i>
            <div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                    Meme Hunter Pro V3
                </h1>
                <p class="text-xs text-slate-400">Solana 链上金狗全自动狙击系统</p>
            </div>
        </div>

        <!-- 核心控制区 -->
        <div class="flex items-center gap-4">
            <div id="statusIndicator" class="flex items-center gap-2 text-sm font-medium text-slate-300">
                <span id="statusDot" class="w-3 h-3 rounded-full bg-slate-500"></span>
                <span id="statusText">连接中...</span>
            </div>
            <button id="engineToggleBtn" onclick="toggleEngine()"
                    class="transition-all duration-300 px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 shadow-lg bg-slate-600 text-white hover:bg-slate-500">
                <i class="fa-solid fa-spinner fa-spin" id="btnIcon"></i>
                <span id="btnText">获取状态中...</span>
            </button>
        </div>
    </header>

    <!-- 主体内容区 -->
    <main class="grid grid-cols-1 lg:grid-cols-4 gap-6 flex-1 min-h-0">

        <!-- 左侧：系统运行状态面板 -->
        <div class="glass-panel p-6 rounded-xl col-span-1 border-t-4 border-emerald-500 transition-colors duration-300 flex flex-col" id="panelBorder">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-server"></i> 引擎状态
            </h2>
            <div class="space-y-4 flex-1">
                <div class="flex justify-between border-b border-slate-700 pb-2">
                    <span class="text-slate-400">当前行动</span>
                    <span id="actionStatus" class="font-medium text-emerald-400">扫描打狗中</span>
                </div>
                <div class="flex justify-between border-b border-slate-700 pb-2">
                    <span class="text-slate-400">自动防守雷达</span>
                    <span class="font-medium text-emerald-400">正常运作</span>
                </div>
                <div class="flex justify-between pb-2">
                    <span class="text-slate-400">目标网络</span>
                    <span class="font-medium text-cyan-400">Solana (Pump.fun)</span>
                </div>
            </div>

            <div class="mt-6 p-4 rounded-lg bg-slate-800/50 text-sm text-slate-300 leading-relaxed">
                💡 <b>提示:</b> 右侧控制台会实时显示机器人的探测日志和安全审计结果。点击上方按钮可随时召回猎犬。
            </div>
        </div>

        <!-- 右侧：实时日志监控控制台 -->
        <div class="glass-panel p-0 rounded-xl col-span-1 lg:col-span-3 flex flex-col overflow-hidden h-[600px] border border-slate-700">
            <!-- 控制台头部 -->
            <div class="bg-slate-800/80 p-3 px-5 border-b border-slate-700 flex justify-between items-center">
                <h2 class="text-sm font-semibold flex items-center gap-2 text-slate-200">
                    <i class="fa-solid fa-terminal text-cyan-400"></i> 猎犬探测雷达 (Live Terminal)
                </h2>
                <div class="flex gap-2">
                    <span class="w-3 h-3 rounded-full bg-red-500"></span>
                    <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                </div>
            </div>
            <!-- 日志滚动区 -->
            <div id="logTerminal" class="flex-1 bg-black/90 p-4 overflow-y-auto font-mono text-xs sm:text-sm leading-relaxed space-y-1">
                <div class="text-slate-400">[系统] 正在连接主引擎获取日志流...</div>
            </div>
        </div>

    </main>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        let isEngineActive = false;
        let lastLogContent = "";

        // DOM 元素引用
        const btn = document.getElementById('engineToggleBtn');
        const btnIcon = document.getElementById('btnIcon');
        const btnText = document.getElementById('btnText');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const panelBorder = document.getElementById('panelBorder');
        const actionStatus = document.getElementById('actionStatus');
        const logTerminal = document.getElementById('logTerminal');

        document.addEventListener('DOMContentLoaded', () => {
            fetchEngineStatus();
            fetchLogs(); // 立即拉取一次日志
        });

        // 定时器：5秒检查一次状态，2秒拉取一次日志
        setInterval(fetchEngineStatus, 5000);
        setInterval(fetchLogs, 2000);

        /**
         * 获取并渲染实时日志
         */
        function fetchLogs() {
            fetch(API_BASE + '/api/logs')
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success' && data.logs) {
                        const newLogContent = data.logs.join('\n');
                        // 只有日志内容发生变化时才更新 DOM
                        if (newLogContent !== lastLogContent) {
                            const formattedLogs = data.logs.map(log => {
                                // 基础高亮规则（支持正则匹配图标和关键字）
                                if (log.includes('ERROR') || log.includes('❌') || log.includes('🚨')) {
                                    return `<div class="text-red-400 py-0.5">${log}</div>`;
                                }
                                if (log.includes('WARNING') || log.includes('⚠️') || log.includes('🚫')) {
                                    return `<div class="text-amber-400 py-0.5">${log}</div>`;
                                }
                                if (log.includes('💰') || log.includes('✅') || log.includes('🚀') || log.includes('🔥')) {
                                    return `<div class="text-emerald-400 font-bold py-0.5 bg-emerald-900/20 px-2 rounded">${log}</div>`;
                                }
                                if (log.includes('🧠') || log.includes('Grok')) {
                                    return `<div class="text-purple-400 py-0.5">${log}</div>`;
                                }
                                if (log.includes('📡') || log.includes('🔍') || log.includes('📊')) {
                                    return `<div class="text-cyan-300 py-0.5">${log}</div>`;
                                }
                                return `<div class="text-slate-300 py-0.5">${log}</div>`;
                            }).join('');

                            logTerminal.innerHTML = formattedLogs;
                            // 自动滚动到底部
                            logTerminal.scrollTop = logTerminal.scrollHeight;
                            lastLogContent = newLogContent;
                        }
                    }
                })
                .catch(err => console.error('获取日志流失败:', err));
        }

        /**
         * 获取当前引擎状态
         */
        function fetchEngineStatus() {
            fetch(API_BASE + '/api/status')
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        updateUI(data.is_active);
                    }
                })
                .catch(err => {
                    statusText.innerText = "离线";
                    statusDot.className = "w-3 h-3 rounded-full bg-red-500";
                });
        }

        /**
         * 切换启停状态
         */
        function toggleEngine() {
            const newAction = isEngineActive ? 'stop' : 'start';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-wait');
            btnIcon.className = "fa-solid fa-spinner fa-spin";
            btnText.innerText = "指令下发中...";

            fetch(API_BASE + '/api/toggle_engine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: newAction })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-wait');
                if (data.status === 'success') {
                    updateUI(data.is_active);
                } else {
                    alert("切换失败: " + data.message);
                    fetchEngineStatus();
                }
            })
            .catch(err => {
                alert("网络请求出错，请检查后端是否正常运行。");
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-wait');
                fetchEngineStatus();
            });
        }

        /**
         * 根据状态更新全页面 UI 样式
         */
        function updateUI(active) {
            isEngineActive = active;
            if (active) {
                btn.className = "transition-all duration-300 px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 shadow-lg bg-emerald-500 text-white hover:bg-emerald-600 status-active";
                btnIcon.className = "fa-solid fa-pause";
                btnText.innerText = "一键召回休息";
                statusDot.className = "w-3 h-3 rounded-full bg-emerald-400 animate-pulse";
                statusText.innerText = "引擎运行中";
                statusText.className = "text-emerald-400";
                panelBorder.className = "glass-panel p-6 rounded-xl col-span-1 border-t-4 border-emerald-500 transition-colors duration-300 flex flex-col";
                actionStatus.innerText = "扫描打狗中";
                actionStatus.className = "font-medium text-emerald-400";
            } else {
                btn.className = "transition-all duration-300 px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 shadow-lg bg-red-500 text-white hover:bg-red-600";
                btnIcon.className = "fa-solid fa-play";
                btnText.innerText = "一键唤醒猎犬";
                statusDot.className = "w-3 h-3 rounded-full bg-red-500";
                statusText.innerText = "引擎已暂停";
                statusText.className = "text-red-400";
                panelBorder.className = "glass-panel p-6 rounded-xl col-span-1 border-t-4 border-red-500 transition-colors duration-300 flex flex-col";
                actionStatus.innerText = "待命休息中";
                actionStatus.className = "font-medium text-red-400";
            }
        }
    </script>
</body>
</html>
