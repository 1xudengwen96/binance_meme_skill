<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Hunter Pro V3 - 作战大盘</title>
    <!-- 引入 Tailwind CSS 进行快速美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a; /* 深蓝色暗黑背景 */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 呼吸灯动画 */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .status-active {
            animation: pulse-green 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen p-6">

    <!-- 顶部导航栏 -->
    <header class="flex justify-between items-center mb-8 glass-panel p-4 rounded-xl">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-crosshairs text-3xl text-emerald-400"></i>
            <div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                    Meme Hunter Pro V3
                </h1>
                <p class="text-xs text-slate-400">Solana 链上金狗全自动狙击系统</p>
            </div>
        </div>

        <!-- 核心控制区 -->
        <div class="flex items-center gap-4">
            <div id="statusIndicator" class="flex items-center gap-2 text-sm font-medium text-slate-300">
                <span id="statusDot" class="w-3 h-3 rounded-full bg-slate-500"></span>
                <span id="statusText">连接中...</span>
            </div>
            <button id="engineToggleBtn" onclick="toggleEngine()"
                    class="transition-all duration-300 px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 shadow-lg bg-slate-600 text-white hover:bg-slate-500">
                <i class="fa-solid fa-spinner fa-spin" id="btnIcon"></i>
                <span id="btnText">获取状态中...</span>
            </button>
        </div>
    </header>

    <!-- 主体内容区 (可以扩展你的监控日志等) -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- 左侧：系统运行状态面板 -->
        <div class="glass-panel p-6 rounded-xl col-span-1 border-t-4 border-emerald-500 transition-colors duration-300" id="panelBorder">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-server"></i> 引擎状态
            </h2>
            <div class="space-y-4">
                <div class="flex justify-between border-b border-slate-700 pb-2">
                    <span class="text-slate-400">当前行动</span>
                    <span id="actionStatus" class="font-medium text-emerald-400">扫描打狗中</span>
                </div>
                <div class="flex justify-between border-b border-slate-700 pb-2">
                    <span class="text-slate-400">自动防守雷达</span>
                    <span class="font-medium text-emerald-400">正常运作</span>
                </div>
                <div class="flex justify-between pb-2">
                    <span class="text-slate-400">目标网络</span>
                    <span class="font-medium text-cyan-400">Solana (Pump.fun)</span>
                </div>
            </div>

            <div class="mt-6 p-4 rounded-lg bg-slate-800/50 text-sm text-slate-300 leading-relaxed">
                💡 <b>提示:</b> 点击右上角的控制按钮可以一键召回猎犬。休息状态下将完全停止调用 Binance 和 Grok 接口，为您节省 Token 消耗。
            </div>
        </div>

        <!-- 右侧：雷达监控区占位 (供未来扩展) -->
        <div class="glass-panel p-6 rounded-xl col-span-1 lg:col-span-2 flex flex-col items-center justify-center text-slate-500 min-h-[300px]">
            <i class="fa-solid fa-radar text-5xl mb-3 opacity-50"></i>
            <p>请在后端终端 (Terminal) 查看详细的扫描和打狗日志。</p>
            <p class="text-xs mt-2">实时持仓监控面板准备中...</p>
        </div>

    </main>

    <script>
        // API 基础路径，解决 blob 预览环境或直接双击打开 HTML 时的 URL 解析错误
        const API_BASE = 'http://127.0.0.1:8000';

        // 状态变量
        let isEngineActive = false;

        // DOM 元素引用
        const btn = document.getElementById('engineToggleBtn');
        const btnIcon = document.getElementById('btnIcon');
        const btnText = document.getElementById('btnText');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const panelBorder = document.getElementById('panelBorder');
        const actionStatus = document.getElementById('actionStatus');

        // 页面加载时获取一次初始状态
        document.addEventListener('DOMContentLoaded', fetchEngineStatus);

        // 每隔 10 秒偷偷拉一次状态（防止多开窗口状态不同步）
        setInterval(fetchEngineStatus, 10000);

        /**
         * 获取当前引擎状态
         */
        function fetchEngineStatus() {
            // 使用绝对路径，强制向本地 8000 端口发送请求
            fetch(API_BASE + '/api/status')
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        updateUI(data.is_active);
                    }
                })
                .catch(err => {
                    console.error('获取状态失败:', err);
                    statusText.innerText = "离线";
                    statusDot.className = "w-3 h-3 rounded-full bg-red-500";
                });
        }

        /**
         * 切换启停状态
         */
        function toggleEngine() {
            const newAction = isEngineActive ? 'stop' : 'start';

            // 按钮进入加载中过渡状态
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-wait');
            btnIcon.className = "fa-solid fa-spinner fa-spin";
            btnText.innerText = "切换中...";

            // 使用绝对路径，强制向本地 8000 端口发送请求
            fetch(API_BASE + '/api/toggle_engine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: newAction })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-wait');

                if (data.status === 'success') {
                    updateUI(data.is_active);
                    // 弹窗提示结果
                    if(data.is_active) {
                        alert("🚀 猎犬已出笼，恢复打狗扫描！");
                    } else {
                        alert("⏸️ 猎犬已召回，进入安全休息状态。");
                    }
                } else {
                    alert("切换失败: " + data.message);
                    fetchEngineStatus(); // 失败则恢复真实状态
                }
            })
            .catch(err => {
                console.error('切换请求出错:', err);
                alert("网络请求出错，请检查后端是否正常运行。");
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-wait');
                fetchEngineStatus();
            });
        }

        /**
         * 根据状态更新全页面 UI 样式
         */
        function updateUI(active) {
            isEngineActive = active;
            if (active) {
                // 工作状态样式 (绿色主题)
                btn.className = "transition-all duration-300 px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 shadow-lg bg-emerald-500 text-white hover:bg-emerald-600 status-active";
                btnIcon.className = "fa-solid fa-pause";
                btnText.innerText = "一键召回休息";

                statusDot.className = "w-3 h-3 rounded-full bg-emerald-400 animate-pulse";
                statusText.innerText = "引擎运行中";
                statusText.className = "text-emerald-400";

                panelBorder.className = "glass-panel p-6 rounded-xl col-span-1 border-t-4 border-emerald-500 transition-colors duration-300";
                actionStatus.innerText = "扫描打狗中";
                actionStatus.className = "font-medium text-emerald-400";
            } else {
                // 休息状态样式 (红色/灰色主题)
                btn.className = "transition-all duration-300 px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 shadow-lg bg-red-500 text-white hover:bg-red-600";
                btnIcon.className = "fa-solid fa-play";
                btnText.innerText = "一键唤醒猎犬";

                statusDot.className = "w-3 h-3 rounded-full bg-red-500";
                statusText.innerText = "引擎已暂停";
                statusText.className = "text-red-400";

                panelBorder.className = "glass-panel p-6 rounded-xl col-span-1 border-t-4 border-red-500 transition-colors duration-300";
                actionStatus.innerText = "待命休息中";
                actionStatus.className = "font-medium text-red-400";
            }
        }
    </script>
</body>
</html>
