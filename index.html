<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Hunter Pro V4 - 云端作战大盘</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cyber: {
                            bg: '#0B0F19',
                            panel: '#151C2C',
                            border: '#232D42',
                            accent: '#00E6A5',
                            glow: 'rgba(0, 230, 165, 0.2)',
                            danger: '#FF3B5C',
                            warning: '#FFB020',
                            ai: '#A855F7'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F19; color: #E2E8F0; }
        .glass-panel {
            background-color: #151C2C;
            border: 1px solid #232D42;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0B0F19; }
        ::-webkit-scrollbar-thumb { background: #232D42; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        .nav-item.active {
            background: rgba(0, 230, 165, 0.1);
            color: #00E6A5;
            border-right: 3px solid #00E6A5;
        }

        /* 终端静态扫描线背景 (移除会导致 DOM 重绘的动画，改用纯静态视觉表现) */
        .terminal-bg {
            position: relative;
            overflow-x: hidden;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,230,165,0.03) 2px, rgba(0,230,165,0.03) 4px);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm">

    <!-- 左侧导航栏 -->
    <aside class="w-20 md:w-64 glass-panel border-r border-cyber-border flex flex-col justify-between transition-all duration-300 z-20">
        <div>
            <!-- Logo -->
            <div class="h-20 flex items-center justify-center md:justify-start md:px-6 border-b border-cyber-border">
                <i class="fa-solid fa-crosshairs text-cyber-accent text-3xl"></i>
                <div class="hidden md:block ml-3">
                    <h1 class="font-bold text-lg text-white tracking-wider">MEME<span class="text-cyber-accent">HUNTER</span></h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Pro V4 Cloud</p>
                </div>
            </div>

            <!-- 导航菜单 -->
            <nav class="mt-6 flex flex-col gap-2 px-2">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item active flex items-center p-3 rounded-lg transition-colors hover:bg-slate-800 text-slate-400">
                    <i class="fa-solid fa-radar w-6 text-center text-lg"></i>
                    <span class="hidden md:block ml-3 font-medium">作战雷达</span>
                </button>
                <button onclick="switchTab('config')" id="nav-config" class="nav-item flex items-center p-3 rounded-lg transition-colors hover:bg-slate-800 text-slate-400">
                    <i class="fa-solid fa-sliders w-6 text-center text-lg"></i>
                    <span class="hidden md:block ml-3 font-medium">系统配置</span>
                </button>
            </nav>
        </div>

        <!-- 底部状态面板 -->
        <div class="p-4 border-t border-cyber-border bg-black/20">
            <div class="flex items-center justify-center md:justify-start gap-3">
                <div class="relative">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(255,59,92,0.6)]"></div>
                </div>
                <div class="hidden md:block">
                    <p class="text-xs text-slate-400">核心引擎</p>
                    <p id="statusText" class="text-sm font-bold text-cyber-danger">离线 / 待命</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="flex-1 flex flex-col h-full bg-cyber-bg relative overflow-y-auto">

        <!-- 顶栏 -->
        <header class="h-20 glass-panel border-b border-cyber-border flex items-center justify-between px-6 sticky top-0 z-10">
            <h2 id="pageTitle" class="text-xl font-bold text-white flex items-center gap-2">
                <i class="fa-solid fa-radar text-cyber-accent"></i> 实时作战雷达
            </h2>

            <div class="flex items-center gap-4">
                <div class="hidden md:flex flex-col text-right">
                    <span class="text-xs text-slate-400">网络节点</span>
                    <span class="text-sm font-mono text-cyan-400">Solana Mainnet (CT_501)</span>
                </div>
                <div class="h-8 w-px bg-cyber-border"></div>
                <button id="engineToggleBtn" onclick="toggleEngine()" class="bg-cyber-danger hover:bg-red-600 text-white px-6 py-2.5 rounded-md font-bold transition-all shadow-lg flex items-center gap-2">
                    <i id="btnIcon" class="fa-solid fa-play"></i>
                    <span id="btnText">唤醒猎犬</span>
                </button>
            </div>
        </header>

        <!-- ==================== 标签页 1: 作战雷达 ==================== -->
        <div id="tab-dashboard" class="p-6 flex-1 flex flex-col gap-6 tab-content">
            <!-- 动态真实数据看板 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 flex-shrink-0">
                <div class="glass-panel p-4 rounded-xl flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 text-xl border border-blue-500/20">
                        <i class="fa-solid fa-eye"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase">总扫描数</p>
                        <p id="stat-scanned" class="text-xl font-mono font-bold transition-all duration-300">0</p>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-purple-500/10 flex items-center justify-center text-purple-400 text-xl border border-purple-500/20">
                        <i class="fa-solid fa-brain"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase">AI/高危拦截</p>
                        <p id="stat-blocked" class="text-xl font-mono font-bold text-purple-400 transition-all duration-300">0</p>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-cyber-accent/10 flex items-center justify-center text-cyber-accent text-xl border border-cyber-accent/20">
                        <i class="fa-solid fa-bullseye"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase">成功狙击</p>
                        <p id="stat-sniped" class="text-xl font-mono font-bold text-cyber-accent transition-all duration-300">0</p>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-cyber-warning/10 flex items-center justify-center text-cyber-warning text-xl border border-cyber-warning/20">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase">防守撤退</p>
                        <p id="stat-defended" class="text-xl font-mono font-bold text-cyber-warning transition-all duration-300">0</p>
                    </div>
                </div>
            </div>

            <!-- 终端日志区域 -->
            <div class="flex-1 glass-panel rounded-xl border border-cyber-border flex flex-col min-h-[400px]">
                <div class="h-12 border-b border-cyber-border bg-black/30 flex justify-between items-center px-4">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                        <span class="ml-4 font-mono text-xs text-slate-400">root@meme-hunter:~# tail -f /var/log/sniper.log</span>
                    </div>
                    <div class="flex gap-2 text-xs">
                        <button onclick="setLogFilter('all')" id="filter-all" class="px-2 py-1 rounded bg-slate-700 text-white">全部</button>
                        <button onclick="setLogFilter('success')" id="filter-success" class="px-2 py-1 rounded text-slate-400 hover:text-white">✅ 成功</button>
                        <button onclick="setLogFilter('ai')" id="filter-ai" class="px-2 py-1 rounded text-slate-400 hover:text-white">🧠 Grok</button>
                        <button onclick="setLogFilter('error')" id="filter-error" class="px-2 py-1 rounded text-slate-400 hover:text-white">❌ 拦截</button>
                        <label class="flex items-center ml-2 cursor-pointer text-slate-300">
                            <input type="checkbox" id="autoScrollCheck" checked class="mr-1 accent-cyber-accent"> 自动滚动
                        </label>
                    </div>
                </div>
                <div id="logTerminal" class="flex-1 bg-black/90 p-4 overflow-y-auto font-mono text-[13px] leading-relaxed terminal-bg">
                    <div id="waitingMsg" class="text-slate-500 italic">等待引擎日志输入流...</div>
                </div>
            </div>
        </div>

        <!-- ==================== 标签页 2: 系统配置 ==================== -->
        <div id="tab-config" class="p-6 flex-1 hidden tab-content overflow-y-auto">
            <div class="max-w-4xl mx-auto space-y-6">
                <div class="bg-blue-500/10 border border-blue-500/30 p-4 rounded-xl flex items-start gap-3">
                    <i class="fa-solid fa-circle-info text-blue-400 mt-0.5"></i>
                    <div>
                        <h4 class="text-blue-400 font-bold text-sm">云端热更新说明</h4>
                        <p class="text-xs text-slate-300 mt-1">在此处修改的参数将直接下发给云端 Python 引擎，**无需重启服务器**。保存后将在下一次扫描轮次中生效。</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-panel p-6 rounded-xl border-t-2 border-t-cyber-accent">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-money-bill-transfer text-cyber-accent"></i> 核心交易参数</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">默认买入金额 (SOL)</label>
                                <input type="number" id="cfg_buy_amount" value="0.1" step="0.01" class="w-full bg-black/50 border border-cyber-border rounded-lg p-2.5 text-white focus:outline-none focus:border-cyber-accent font-mono">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">防夹优先费 Priority Fee (SOL)</label>
                                <input type="number" id="cfg_priority_fee" value="0.005" step="0.001" class="w-full bg-black/50 border border-cyber-border rounded-lg p-2.5 text-white focus:outline-none focus:border-cyber-accent font-mono">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">默认强吃滑点 (%)</label>
                                <input type="number" id="cfg_slippage" value="10" class="w-full bg-black/50 border border-cyber-border rounded-lg p-2.5 text-white focus:outline-none focus:border-cyber-accent font-mono">
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-xl border-t-2 border-t-cyber-ai">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-brain text-cyber-ai"></i> AI 与拦截网阈值</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">呼叫 Grok 的物理初筛最低分</label>
                                <input type="number" id="cfg_grok_threshold" value="45" class="w-full bg-black/50 border border-cyber-border rounded-lg p-2.5 text-white focus:outline-none focus:border-cyber-ai font-mono">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">前十持仓占比上限 (%)</label>
                                <input type="number" id="cfg_max_top10" value="75.0" class="w-full bg-black/50 border border-cyber-border rounded-lg p-2.5 text-white focus:outline-none focus:border-cyber-ai font-mono">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">目标链网络 (CT_501=Solana, 56=BSC)</label>
                                <select id="cfg_chain" class="w-full bg-black/50 border border-cyber-border rounded-lg p-2.5 text-white focus:outline-none focus:border-cyber-ai font-mono">
                                    <option value="CT_501">Solana (CT_501)</option>
                                    <option value="56">BSC (56)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end pt-4">
                    <button onclick="saveConfig()" class="bg-cyber-accent text-black font-bold px-8 py-3 rounded-lg shadow-[0_0_15px_rgba(0,230,165,0.4)] hover:shadow-[0_0_25px_rgba(0,230,165,0.6)] transition-all flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up"></i> 下发参数至云端
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Toast 通知系统 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <script>
        const API_BASE = (window.location.protocol === 'file:') ? 'http://127.0.0.1:8000' : '';

        let isEngineActive = false;

        // 【核心优化】日志增量追踪系统
        let currentLastId = -1;
        let localLogsBuffer = []; // 本地储存一份，用于本地秒切 Filter 无需请求服务器
        let currentFilter = 'all';

        const btn = document.getElementById('engineToggleBtn');
        const btnIcon = document.getElementById('btnIcon');
        const btnText = document.getElementById('btnText');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const logTerminal = document.getElementById('logTerminal');

        document.addEventListener('DOMContentLoaded', () => {
            fetchEngineStatus();
            fetchLogs();
            fetchStats();

            // 提高轮询频率至 1 秒，增强真实性和实时感
            setInterval(fetchLogs, 1000);
            setInterval(fetchStats, 5000);
            setInterval(fetchEngineStatus, 5000);
        });

        // ==================== 数据看板刷新 ====================
        function fetchStats() {
            fetch(API_BASE + '/api/stats')
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success' && data.stats) {
                        animateValueUpdate('stat-scanned', data.stats.total_scanned);
                        animateValueUpdate('stat-blocked', data.stats.ai_blocked);
                        animateValueUpdate('stat-sniped', data.stats.success_sniped);
                        animateValueUpdate('stat-defended', data.stats.defended);
                    }
                })
                .catch(err => console.error('获取统计数据失败', err));
        }

        function animateValueUpdate(id, newValue) {
            const el = document.getElementById(id);
            if (el.innerText !== newValue.toLocaleString()) {
                el.style.opacity = '0.5';
                el.innerText = newValue.toLocaleString();
                setTimeout(() => { el.style.opacity = '1'; }, 150);
            }
        }

        // ==================== 导航系统 ====================
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active', 'bg-slate-800');
                el.style.borderRight = "none";
                el.style.background = "transparent";
                el.style.color = "#94A3B8";
            });

            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            const activeNav = document.getElementById(`nav-${tabId}`);
            activeNav.classList.add('active');
            activeNav.style.borderRight = "3px solid #00E6A5";
            activeNav.style.background = "rgba(0, 230, 165, 0.1)";
            activeNav.style.color = "#00E6A5";

            const titles = {
                'dashboard': '<i class="fa-solid fa-radar text-cyber-accent"></i> 实时作战雷达',
                'config': '<i class="fa-solid fa-sliders text-cyber-ai"></i> 云端参数配置'
            };
            document.getElementById('pageTitle').innerHTML = titles[tabId];
        }

        // ==================== 高性能增量日志系统 ====================
        function setLogFilter(filterType) {
            currentFilter = filterType;
            ['all', 'success', 'ai', 'error'].forEach(type => {
                const btn = document.getElementById(`filter-${type}`);
                if(type === filterType) {
                    btn.classList.replace('bg-transparent', 'bg-slate-700');
                    btn.classList.add('text-white');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.replace('bg-slate-700', 'bg-transparent');
                    btn.classList.remove('text-white');
                    btn.classList.add('text-slate-400');
                }
            });

            // 切换过滤器时，清空面板，从本地缓存全量重绘一次
            logTerminal.innerHTML = '';
            appendNewLogsToDOM(localLogsBuffer);
        }

        function fetchLogs() {
            // 每次请求只拉取比 currentLastId 更新的日志
            fetch(API_BASE + `/api/logs?last_id=${currentLastId}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success' && data.logs && data.logs.length > 0) {
                        // 更新最新追踪 ID
                        currentLastId = data.logs[data.logs.length - 1].id;

                        // 存入本地缓存，保证本地保留最多 500 条用于过滤切换
                        localLogsBuffer = localLogsBuffer.concat(data.logs);
                        if (localLogsBuffer.length > 500) {
                            localLogsBuffer = localLogsBuffer.slice(-500);
                        }

                        // 将新日志追加到 DOM
                        appendNewLogsToDOM(data.logs);
                    }
                })
                .catch(err => console.error('获取日志流失败', err));
        }

        function appendNewLogsToDOM(newLogs) {
            let htmlToAppend = '';
            let addedCount = 0;

            newLogs.forEach(logObj => {
                const log = logObj.text;

                const isError = log.includes('ERROR') || log.includes('❌') || log.includes('🚨') || log.includes('🚫');
                const isSuccess = log.includes('✅') || log.includes('🚀') || log.includes('🔥') || log.includes('🎉');
                const isAI = log.includes('🧠') || log.includes('Grok') || log.includes('🏁');

                if (currentFilter === 'error' && !isError) return;
                if (currentFilter === 'success' && !isSuccess) return;
                if (currentFilter === 'ai' && !isAI) return;

                let cssClass = "text-slate-300";
                let prefix = "<span class='text-slate-600'>|</span> ";

                if (isError) {
                    cssClass = "text-red-400 bg-red-900/10 px-2 border-l-2 border-red-500 my-1";
                    prefix = "";
                } else if (isSuccess) {
                    cssClass = "text-cyber-accent font-bold bg-emerald-900/20 px-2 border-l-2 border-cyber-accent my-1";
                    prefix = "";
                } else if (isAI) {
                    cssClass = "text-purple-400";
                } else if (log.includes('📡') || log.includes('🔍') || log.includes('🦅')) {
                    cssClass = "text-cyan-400";
                }

                htmlToAppend += `<div class="py-0.5 ${cssClass} break-words whitespace-pre-wrap">${prefix}${log}</div>`;
                addedCount++;
            });

            if (addedCount > 0) {
                const waitingMsg = document.getElementById('waitingMsg');
                if (waitingMsg) waitingMsg.remove();

                // 核心修复：直接使用 insertAdjacentHTML 进行节点追加，不破坏原有 DOM，不再有任何闪烁
                logTerminal.insertAdjacentHTML('beforeend', htmlToAppend);

                // 性能保护：防止浏览器卡死，DOM 节点维持在最大 150 个，老的像队列一样剔除掉
                while (logTerminal.children.length > 150) {
                    logTerminal.removeChild(logTerminal.firstChild);
                }

                // 自动滚动到最底部
                if(document.getElementById('autoScrollCheck').checked) {
                    logTerminal.scrollTop = logTerminal.scrollHeight;
                }
            }
        }

        // ==================== 引擎状态控制 ====================
        function fetchEngineStatus() {
            fetch(API_BASE + '/api/status')
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        updateUI(data.is_active);
                    }
                })
                .catch(err => {
                    updateUI(false, true);
                });
        }

        function toggleEngine() {
            const newAction = isEngineActive ? 'stop' : 'start';
            btn.disabled = true;
            btnIcon.className = "fa-solid fa-spinner fa-spin";
            btnText.innerText = "下发指令中...";

            fetch(API_BASE + '/api/toggle_engine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: newAction })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                if (data.status === 'success') {
                    updateUI(data.is_active);
                    showToast(data.message, 'success');
                } else {
                    showToast("切换失败: " + data.message, 'error');
                    fetchEngineStatus();
                }
            })
            .catch(err => {
                btn.disabled = false;
                showToast("网络请求出错，请检查服务端配置", 'error');
                fetchEngineStatus();
            });
        }

        function updateUI(active, isOffline = false) {
            isEngineActive = active;

            if (isOffline) {
                statusDot.className = "w-3 h-3 rounded-full bg-slate-600";
                statusText.innerText = "后端服务器离线";
                statusText.className = "text-sm font-bold text-slate-500";
                btn.className = "bg-slate-700 text-slate-400 px-6 py-2.5 rounded-md font-bold shadow-lg flex items-center gap-2 cursor-not-allowed";
                btnIcon.className = "fa-solid fa-link-slash";
                btnText.innerText = "连接断开";
                return;
            }

            if (active) {
                btn.className = "bg-cyber-danger hover:bg-red-600 text-white px-6 py-2.5 rounded-md font-bold transition-all shadow-[0_0_15px_rgba(255,59,92,0.4)] flex items-center gap-2";
                btnIcon.className = "fa-solid fa-stop";
                btnText.innerText = "紧急召回猎犬";

                statusDot.className = "w-3 h-3 rounded-full bg-cyber-accent shadow-[0_0_10px_rgba(0,230,165,0.6)] animate-pulse";
                statusText.innerText = "引擎扫描中...";
                statusText.className = "text-sm font-bold text-cyber-accent";
            } else {
                btn.className = "bg-cyber-accent hover:bg-emerald-400 text-black px-6 py-2.5 rounded-md font-bold transition-all shadow-[0_0_15px_rgba(0,230,165,0.4)] flex items-center gap-2";
                btnIcon.className = "fa-solid fa-play";
                btnText.innerText = "唤醒猎犬打狗";

                statusDot.className = "w-3 h-3 rounded-full bg-cyber-danger shadow-[0_0_10px_rgba(255,59,92,0.6)]";
                statusText.innerText = "引擎已待命";
                statusText.className = "text-sm font-bold text-cyber-danger";
            }
        }

        function saveConfig() {
            const configData = {
                buy_amount: document.getElementById('cfg_buy_amount').value,
                priority_fee: document.getElementById('cfg_priority_fee').value,
                slippage: document.getElementById('cfg_slippage').value,
                grok_threshold: document.getElementById('cfg_grok_threshold').value,
                max_top10: document.getElementById('cfg_max_top10').value,
                chain_id: document.getElementById('cfg_chain').value
            };

            showToast("正在同步参数至云端节点...", "info");

            fetch(API_BASE + '/api/update_config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(configData)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    showToast("配置已成功下发！下一轮扫描生效。", "success");
                } else {
                    showToast("下发失败: " + data.message, "error");
                }
            })
            .catch(err => {
                showToast("网络请求出错，请检查服务端", "error");
            });
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');

            let icon = 'fa-circle-info';
            let colorClass = 'bg-blue-500/20 border-blue-500 text-blue-400';

            if(type === 'success') { icon = 'fa-circle-check'; colorClass = 'bg-emerald-500/20 border-emerald-500 text-emerald-400'; }
            if(type === 'error') { icon = 'fa-circle-xmark'; colorClass = 'bg-red-500/20 border-red-500 text-red-400'; }
            if(type === 'warning') { icon = 'fa-triangle-exclamation'; colorClass = 'bg-yellow-500/20 border-yellow-500 text-yellow-400'; }

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-lg border backdrop-blur-md shadow-lg transform transition-all duration-300 translate-y-10 opacity-0 ${colorClass}`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span class="text-sm font-medium text-white">${message}</span>`;

            document.getElementById('toastContainer').appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-10');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
